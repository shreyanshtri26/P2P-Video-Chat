<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voceo — Secure P2P Video</title>
  <meta name="description" content="Premium peer-to-peer video conferencing powered by WebRTC. Secure, fast, no plugins.">
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Google+Sans+Display:wght@700&family=Outfit:wght@300;400;600;800&display=swap"
    rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <link rel="stylesheet" type="text/css" href="style.css" />
</head>

<body>

  <!-- ══════════════════════════════════════
       LOBBY SCREEN
  ══════════════════════════════════════ -->
  <div id="roomConfig" class="lobby-screen">

    <!-- Left: Branding + Device Checks -->
    <div class="lobby-left">
      <div class="lobby-brand">
        <i class="bi bi-shield-shaded brand-icon"></i>
        <span class="brand-name">voceo</span>
      </div>
      <!-- Server Info Badge -->
      <div id="serverBadge" class="server-badge">
        <span class="server-dot" id="serverDot"></span>
        <span id="serverBadgeText">Connecting…</span>
      </div>

      <!-- Self Preview -->
      <div class="preview-container">
        <video id="previewVideo" muted autoplay playsinline class="preview-video"></video>
        <div class="preview-controls">
          <button id="previewToggleMic" class="preview-ctrl-btn active" title="Toggle Microphone">
            <i id="previewMicIcon" class="bi bi-mic-fill"></i>
          </button>
          <button id="previewToggleCam" class="preview-ctrl-btn active" title="Toggle Camera">
            <i id="previewCamIcon" class="bi bi-camera-video-fill"></i>
          </button>
        </div>
        <!-- Audio level ring -->
        <div id="previewAudioRing" class="preview-audio-ring"></div>
      </div>

      <!-- Device Selectors -->
      <div class="device-selectors">
        <div class="device-select-group">
          <i class="bi bi-mic device-icon"></i>
          <select id="audioSelect" class="device-select">
            <option value="">Default Microphone</option>
          </select>
        </div>
        <div class="device-select-group">
          <i class="bi bi-camera-video device-icon"></i>
          <select id="videoSelect" class="device-select">
            <option value="">Default Camera</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Right: Join Panel -->
    <div class="lobby-right">
      <div class="join-card">
        <h1 class="join-title">Join a Meeting</h1>
        <p class="join-subtitle">Secure, end-to-end P2P video calling</p>

        <div class="join-form">
          <div class="input-wrapper">
            <i class="bi bi-hash input-icon"></i>
            <input id="roomName" type="text" class="join-input" placeholder="Enter room code" autocomplete="off"
              spellcheck="false">
          </div>
          <button id="btnConnect" class="join-btn">
            <i class="bi bi-arrow-right-circle-fill me-2"></i>
            Join Now
          </button>
        </div>

        <p class="join-hint">Up to 4 people can join the same room code</p>
      </div>
    </div>
  </div>


  <!-- ══════════════════════════════════════
       CALL SCREEN
  ══════════════════════════════════════ -->
  <div id="roomDiv" class="call-screen d-none">

    <!-- Remote Video Grid (populated dynamically for up to 4 peers) -->
    <div id="videoGrid" class="video-grid" data-peers="0"></div>

    <!-- Waiting Overlay -->
    <div id="peerPlaceholder" class="waiting-overlay">
      <div class="waiting-content">
        <div class="waiting-avatar">
          <i class="bi bi-person-fill"></i>
        </div>
        <div class="waiting-spinner"></div>
        <h2 class="waiting-title">Waiting for someone to join…</h2>
        <p class="waiting-room">Room: <span id="roomLabel" class="waiting-room-name"></span></p>
      </div>
    </div>

    <!-- Local PIP Video -->
    <div class="local-pip" id="localPip">
      <video id="localVideo" muted autoplay playsinline class="local-video"></video>
      <div class="pip-overlay">You</div>
      <div id="localAudioRing" class="pip-audio-ring"></div>
    </div>

    <!-- Top Bar (auto-hides) -->
    <div class="call-topbar" id="callTopbar">
      <div class="topbar-left">
        <i class="bi bi-shield-shaded brand-icon-sm"></i>
        <span class="brand-name-sm">voceo</span>
      </div>
      <div class="topbar-center">
      </div>
      <div class="topbar-right">
        <span id="callTimer" class="call-timer">00:00</span>
        <div id="serverChip" class="server-chip d-none">
          <i class="bi bi-hdd-network-fill"></i>
          <span id="serverChipText"></span>
        </div>
        <div id="connectionBadge" class="conn-badge conn-waiting">
          <i class="bi bi-circle-fill conn-dot"></i>
          <span id="connStatus">Waiting</span>
        </div>
      </div>
    </div>

    <!-- Shortcuts Guide -->
    <div class="shortcuts-guide">
      <div class="shortcut-item"><span class="key">M</span> Mic</div>
      <div class="shortcut-item"><span class="key">V</span> Cam</div>
      <div class="shortcut-item"><span class="key">F</span> Fullscreen</div>
      <div class="shortcut-item"><span class="key">C</span> Chat</div>
      <div class="shortcut-item"><span class="key">S</span> Share</div>
      <div class="shortcut-item"><span class="key">L</span> Leave</div>
    </div>

    <!-- Bottom Controls Bar (auto-hides) -->
    <div class="call-controls" id="callControls">
      <!-- Left: Room info -->
      <div class="ctrl-section ctrl-left">
        <span class="ctrl-room-name" id="ctrlRoomName"></span>
      </div>

      <!-- Center: Main controls -->
      <div class="ctrl-section ctrl-center">
        <!-- Mic -->
        <div class="ctrl-btn-wrap">
          <button id="toggleAudio" class="ctrl-btn ctrl-active" title="Mute / Unmute">
            <span class="ctrl-btn-inner">
              <i id="audioIcon" class="bi bi-mic-fill"></i>
              <span class="audio-bars" id="audioBars">
                <span class="ab ab1"></span>
                <span class="ab ab2"></span>
                <span class="ab ab3"></span>
              </span>
            </span>
          </button>
          <span class="ctrl-label">Mic</span>
        </div>

        <!-- Camera -->
        <div class="ctrl-btn-wrap">
          <button id="toggleVideo" class="ctrl-btn ctrl-active" title="Turn off / on camera">
            <span class="ctrl-btn-inner">
              <i id="videoIcon" class="bi bi-camera-video-fill"></i>
            </span>
          </button>
          <span class="ctrl-label">Camera</span>
        </div>

        <!-- Fullscreen -->
        <div class="ctrl-btn-wrap">
          <button id="btnFullscreen" class="ctrl-btn ctrl-neutral" title="Toggle fullscreen">
            <span class="ctrl-btn-inner">
              <i id="fullscreenIcon" class="bi bi-fullscreen"></i>
            </span>
          </button>
          <span class="ctrl-label">Fullscreen</span>
        </div>

        <!-- Flip Local Video -->
        <div class="ctrl-btn-wrap">
          <button id="btnFlip" class="ctrl-btn ctrl-neutral" title="Flip local video">
            <span class="ctrl-btn-inner">
              <i class="bi bi-arrow-left-right"></i>
            </span>
          </button>
          <span class="ctrl-label">Flip</span>
        </div>

        <!-- Chat Toggle -->
        <div class="ctrl-btn-wrap">
          <button id="toggleChat" class="ctrl-btn ctrl-neutral" title="Toggle Chat">
            <span class="ctrl-btn-inner">
              <i id="chatIcon" class="bi bi-chat-dots-fill"></i>
              <span id="chatBadge" class="chat-badge d-none">0</span>
            </span>
          </button>
          <span class="ctrl-label">Chat</span>
        </div>

        <!-- Share Screen -->
        <div class="ctrl-btn-wrap">
          <button id="btnScreenShare" class="ctrl-btn ctrl-neutral" title="Share Screen">
            <span class="ctrl-btn-inner">
              <i id="shareIcon" class="bi bi-display"></i>
            </span>
          </button>
          <span class="ctrl-label">Share</span>
        </div>

        <!-- Leave Call -->
        <div class="ctrl-btn-wrap">
          <button id="btnLeave" onclick="window.location.reload()" class="ctrl-btn ctrl-leave" title="Leave call">
            <span class="ctrl-btn-inner">
              <i class="bi bi-telephone-x-fill"></i>
            </span>
          </button>
          <span class="ctrl-label leave-label">Leave</span>
        </div>
      </div>

      <!-- Right: Action padding -->
      </div>
    </div>

    <!-- Chat Panel -->
    <div id="chatPanel" class="chat-panel hidden">
      <div class="chat-header">
        <h3 class="chat-title"><i class="bi bi-chat-dots-fill me-2"></i>Messages</h3>
        <button id="closeChat" class="chat-close-btn">&times;</button>
      </div>
      <div id="chatMessages" class="chat-messages"></div>
      <div class="chat-input-wrapper">
        <input id="chatInput" type="text" placeholder="Send a message to everyone..." autocomplete="off">
        <button id="sendChatBtn" class="chat-send-btn">
          <i class="bi bi-send-fill"></i>
        </button>
      </div>
    <!-- Toast Notification -->
    <div id="toast" class="toast-notification d-none">
      <i id="toastIcon" class="bi bi-info-circle me-2"></i>
      <span id="toastMsg">Notification</span>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.2.0/socket.io.js"></script>
  <script src="client.js?v=4"></script>
</body>

</html>
